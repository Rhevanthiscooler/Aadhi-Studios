<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadi Studios - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a3aff;
            --secondary-color: #6c5ce7;
            --bg-color: #f8f9fd;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 550px;
            transition: all 0.6s ease-in-out;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }

        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .container.right-panel-active .sign-in-container {
            transform: translateX(100%);
            opacity: 0;
            z-index: 1;
        }

        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        form {
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            height: 100%;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .input-group {
            position: relative;
            width: 100%;
            margin: 8px 0;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            transition: color 0.3s;
        }

        input {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            padding: 12px 15px 12px 45px;
            margin: 0;
            width: 100%;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background-color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 58, 255, 0.1);
        }

        input:focus + i {
            color: var(--primary-color);
        }

        .dob-container {
            position: relative;
            width: 100%;
        }

        input[type="date"] {
            position: relative;
            cursor: pointer;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }

        button {
            border-radius: 20px;
            border: 1px solid var(--primary-color);
            background-color: var(--primary-color);
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 80ms ease-in, background-color 0.3s;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(74, 58, 255, 0.2);
        }

        button:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.95);
        }

        button.ghost {
            background-color: transparent;
            border-color: #ffffff;
            box-shadow: none;
        }
        
        button.ghost:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: none;
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .container.right-panel-active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #ffffff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .container.right-panel-active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .container.right-panel-active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .container.right-panel-active .overlay-right {
            transform: translateX(20%);
        }

        .overlay p {
            font-size: 14px;
            font-weight: 300;
            line-height: 20px;
            letter-spacing: 0.5px;
            margin: 20px 0 30px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container" id="container">
    
    <div class="form-container sign-up-container">
        <form id="signUpForm">
            <h1>Create Account</h1>
            <p style="color: #718096; font-size: 13px; margin-bottom: 10px;">Join Aadi Studios today</p>
            
            <div class="input-group">
                <input type="text" id="signUpUsername" placeholder="Username" required />
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="email" id="signUpEmail" placeholder="Email ID" required />
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="password" id="signUpPassword" placeholder="Password" required />
                <i class="fas fa-lock"></i>
            </div>
            <div class="input-group dob-container">
                <input type="date" id="signUpDob" required placeholder="Birth Date"/>
                <i class="fas fa-calendar-alt"></i>
            </div>
            
            <button type="submit" id="signUpBtn">Sign Up</button>
        </form>
    </div>

    <div class="form-container sign-in-container">
        <form id="signInForm">
            <h1>Sign In</h1>
            <p style="color: #718096; font-size: 13px; margin-bottom: 10px;">Welcome back to Aadi Studios</p>
            
            <div class="input-group">
                <input type="email" id="signInEmail" placeholder="Email" required />
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="password" id="signInPassword" placeholder="Password" required />
                <i class="fas fa-lock"></i>
            </div>
            
            <button type="submit" id="signInBtn">Sign In</button>
        </form>
    </div>

    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1>Welcome Back!</h1>
                <p>To keep reading your favorite books, please log in with your account details.</p>
                <button class="ghost" id="signIn">Sign In</button>
            </div>
            <div class="overlay-panel overlay-right">
                <h1>Hello, Reader!</h1>
                <p>Enter your personal details and start your journey with Aadi Studios.</p>
                <button class="ghost" id="signUp">Create Account</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAXYitOp20kOucSlG1p1F6NUsuTz4kfGlc",
        authDomain: "aadhi-studios.firebaseapp.com",
        projectId: "aadhi-studios",
        storageBucket: "aadhi-studios.firebasestorage.app",
        messagingSenderId: "1052163368305",
        appId: "1:1052163368305:web:c8c51c39c271659caa42d0",
        measurementId: "G-CMNT724YDW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const signUpButton = document.getElementById('signUp');
    const signInButton = document.getElementById('signIn');
    const container = document.getElementById('container');
    const signInForm = document.getElementById('signInForm');
    const signUpForm = document.getElementById('signUpForm');

    signUpButton.addEventListener('click', () => {
        container.classList.add("right-panel-active");
    });

    signInButton.addEventListener('click', () => {
        container.classList.remove("right-panel-active");
    });

    // Sign Up Execution
    signUpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // CORRECTION: Elements now reference the explicit panel HTML input IDs
        const username = document.getElementById('signUpUsername').value.trim();
        const email = document.getElementById('signUpEmail').value.trim();
        const password = document.getElementById('signUpPassword').value;
        const dob = document.getElementById('signUpDob').value;
        const submitBtn = document.getElementById('signUpBtn');

        submitBtn.innerText = "CREATING PROFILE...";
        submitBtn.disabled = true;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            
            await addDoc(collection(db, "users"), {
                uid: userCredential.user.uid,
                username: username,
                email: email,
                dob: dob,
                banUntil: null
            });

            window.location.href = 'main.html';
        } catch (error) {
            alert("Account creation failed: " + error.message);
            submitBtn.innerText = "Sign Up";
            submitBtn.disabled = false;
        }
    });

    // Sign In Execution
    signInForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('signInEmail').value.trim();
        const password = document.getElementById('signInPassword').value;
        const submitBtn = document.getElementById('signInBtn');

        submitBtn.innerText = "VERIFYING ACCOUNT...";
        submitBtn.disabled = true;

        try {
            const userQuery = query(collection(db, "users"), where("email", "==", email));
            const querySnapshot = await getDocs(userQuery);
            
            if (!querySnapshot.empty) {
                const userData = querySnapshot.docs[0].data();
                if (userData.banUntil && userData.banUntil > Date.now()) {
                    const daysLeft = Math.ceil((userData.banUntil - Date.now()) / (1000 * 60 * 60 * 24));
                    alert(`This account has been restricted. Access denied for another ${daysLeft} days.`);
                    submitBtn.innerText = "Sign In";
                    submitBtn.disabled = false;
                    return;
                }
            }

            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = 'main.html';
        } catch (error) {
            alert("Login failed: " + error.message);
            submitBtn.innerText = "Sign In";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>

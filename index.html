<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadhi Studios - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --accent:    #3b3bd4;
        --accent-h:  #2828b8;
        --ink:       #0f0f0f;
        --ink-2:     #3a3a3a;
        --ink-3:     #767676;
        --ink-4:     #b8b8b8;
        --surface:   #ffffff;
        --surface-2: #f5f5f3;
        --surface-3: #e8e8e4;
        --danger:    #d93025;
        --success:   #1a7f4b;
        --r:         10px;
        --panel-w:   44%;
        --dur:       0.62s;
        --ease:      cubic-bezier(0.76, 0, 0.24, 1);
    }

    html, body {
        height: 100%;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f5f5f3 0%, #eeede9 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
    }

    /* ─── CARD WRAPPER ─────────────────────────────── */
    .card {
        position: relative;
        width: 880px;
        max-width: 100%;
        min-height: 600px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
        background: var(--surface);
    }

    /* ─── FORM PANELS ─────── */
    .form-panel {
        position: absolute;
        top: 0;
        width: calc(100% - var(--panel-w));
        height: 100%;
        padding: 60px 52px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: var(--surface);
        transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
        will-change: transform, opacity;
        overflow-y: auto;
    }

    #signinPanel {
        left: 0;
        transform: translateX(0);
        opacity: 1;
        z-index: 2;
    }

    #signupPanel {
        left: 0;
        transform: translateX(100%);
        opacity: 0;
        z-index: 1;
        pointer-events: none;
    }

    .card.signup-mode #signinPanel {
        transform: translateX(-60px);
        opacity: 0;
        pointer-events: none;
        z-index: 1;
    }

    .card.signup-mode #signupPanel {
        transform: translateX(0);
        opacity: 1;
        pointer-events: all;
        z-index: 2;
    }

    /* ─── BRAND PANEL ──────── */
    .brand-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: var(--panel-w);
        height: 100%;
        background: linear-gradient(135deg, var(--ink) 0%, #1a1a1a 100%);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 52px 44px;
        overflow: hidden;
        transition: none;
        z-index: 10;
    }

    .brand-panel::before {
        content: '';
        position: absolute;
        top: -90px; right: -90px;
        width: 280px; height: 280px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.16;
        pointer-events: none;
    }

    .brand-panel::after {
        content: '';
        position: absolute;
        bottom: -70px; left: -50px;
        width: 220px; height: 220px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.09;
        pointer-events: none;
    }

    .card.signup-mode .brand-panel {
        animation: panelToLeft var(--dur) var(--ease) forwards;
    }

    .card:not(.signup-mode) .brand-panel {
        animation: panelToRight var(--dur) var(--ease) forwards;
    }

    @keyframes panelToLeft {
        from { right: 0;    left: auto; }
        to   { right: auto; left: 0;    }
    }

    @keyframes panelToRight {
        from { right: auto; left: 0;    }
        to   { right: 0;    left: auto; }
    }

    .card.no-anim .brand-panel { animation: none !important; }

    /* ─── BRAND CONTENT ──────────────────────────── */
    .brand-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        z-index: 1;
    }
    .brand-logo-mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        overflow: hidden;
        background: #f3ecd9;
        box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        flex-shrink: 0;
    }
    .brand-logo-mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .brand-logo-text {
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.4px;
    }

    .brand-body {
        position: relative;
        z-index: 1;
        overflow: hidden;
    }

    .brand-content {
        transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
        will-change: transform, opacity;
    }

    .brand-content.signin-content { display: block; }
    .brand-content.signup-content { display: none; margin-top: -100%; }

    .card.signup-mode .brand-content.signin-content {
        transform: translateY(-20px);
        opacity: 0;
    }
    .card.signup-mode .brand-content.signup-content {
        display: block;
        transform: translateY(0);
        opacity: 1;
        margin-top: 0;
    }

    .brand-tagline {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        line-height: 1.2;
        color: #fff;
        margin-bottom: 16px;
        letter-spacing: -0.4px;
        font-weight: 700;
    }

    .brand-sub {
        font-size: 14px;
        color: rgba(255,255,255,0.55);
        line-height: 1.7;
    }

    .brand-footer { position: relative; z-index: 1; }

    .brand-footer p {
        font-size: 13px;
        color: rgba(255,255,255,0.42);
        margin-bottom: 14px;
    }

    .switch-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255,255,255,0.1);
        border: 1.5px solid rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.9);
        font-size: 13px;
        font-weight: 600;
        padding: 11px 22px;
        border-radius: 9px;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s;
    }
    .switch-btn:hover {
        background: rgba(255,255,255,0.15);
        border-color: rgba(255,255,255,0.32);
        transform: translateY(-2px);
    }
    .switch-btn:active { transform: scale(0.98); }

    .switch-btn .arrow {
        display: inline-block;
        transition: transform 0.35s var(--ease);
    }
    .card.signup-mode .switch-btn .arrow { transform: rotate(180deg); }

    /* ─── FORM FIELDS ──────────────────────────────── */
    .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
    }

    .form-heading {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        color: var(--ink);
        margin-bottom: 28px;
        letter-spacing: -0.4px;
        font-weight: 700;
    }

    .field { margin-bottom: 16px; }

    .field label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-2);
        margin-bottom: 7px;
        letter-spacing: 0.2px;
    }

    .field input {
        width: 100%;
        padding: 12px 15px;
        border: 1.5px solid var(--surface-3);
        border-radius: 10px;
        font-size: 15px;
        font-family: 'Inter', sans-serif;
        color: var(--ink);
        background: var(--surface);
        outline: none;
        transition: all 0.2s;
    }
    .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59,59,212,0.1);
        background: #fafaff;
        transform: translateY(-1px);
    }
    .field input::placeholder { color: var(--ink-4); }

    .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .submit-btn {
        width: 100%;
        padding: 14px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        margin-top: 12px;
        letter-spacing: 0.3px;
        position: relative;
        overflow: hidden;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(59,59,212,0.25);
    }
    .submit-btn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0);
        transition: background 0.2s;
    }
    .submit-btn:hover { 
        background: var(--accent-h);
        box-shadow: 0 6px 16px rgba(59,59,212,0.35);
        transform: translateY(-2px);
    }
    .submit-btn:hover::after { background: rgba(255,255,255,0.08); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ─── ERROR / PASSWORD STRENGTH ───────────────── */
    .error-msg {
        display: none;
        align-items: center;
        gap: 9px;
        background: #fef2f2;
        border: 1.5px solid #fecaca;
        color: var(--danger);
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 14px;
        animation: shake 0.38s ease;
    }
    .error-msg.show { display: flex; }

    @keyframes shake {
        0%,100% { transform: translateX(0); }
        20%      { transform: translateX(-5px); }
        40%      { transform: translateX(5px); }
        60%      { transform: translateX(-3px); }
        80%      { transform: translateX(3px); }
    }

    .strength-wrap { margin-top: 6px; }
    .strength-bar {
        height: 3px;
        background: var(--surface-3);
        border-radius: 2px;
        overflow: hidden;
    }
    .strength-fill {
        height: 100%;
        border-radius: 2px;
        width: 0%;
        transition: width 0.3s ease, background 0.3s ease;
    }
    .strength-label {
        font-size: 11px;
        color: var(--ink-4);
        margin-top: 5px;
    }

    /* ─── MOBILE ───────────────────────────────────── */
    @media (max-width: 660px) {
        html, body { align-items: flex-start; overflow-y: auto; }
        .card { border-radius: 0; min-height: 100vh; box-shadow: none; }
        .brand-panel { position: relative; width: 100%; min-height: 220px; padding: 40px 28px; }
        .card:not(.signup-mode) .brand-panel,
        .card.signup-mode .brand-panel { animation: none !important; left: auto; right: auto; }
        .form-panel { position: relative; width: 100%; padding: 40px 28px; transform: none !important; opacity: 1 !important; }
        #signupPanel { display: none; }
        .card.signup-mode #signinPanel { display: none; }
        .card.signup-mode #signupPanel { display: flex; }
        .field-row { grid-template-columns: 1fr; }
    }
    </style>
</head>
<body>

<div class="card no-anim" id="card">

    <!-- ══ SIGN IN PANEL ══════════════════════════════ -->
    <div class="form-panel" id="signinPanel">
        <div class="eyebrow">Welcome back</div>
        <h1 class="form-heading">Sign in</h1>

        <div class="error-msg" id="siError">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="siErrorText"></span>
        </div>

        <div class="field">
            <label>Email address</label>
            <input type="email" id="siEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="submit-btn" id="siBtn">Sign in</button>
    </div>

    <!-- ══ SIGN UP PANEL ══════════════════════════════ -->
    <div class="form-panel" id="signupPanel">

        <div id="signupForm">
            <div class="eyebrow">New here</div>
            <h1 class="form-heading">Create account</h1>

            <div class="error-msg" id="suError">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="suErrorText"></span>
            </div>

            <div class="field">
                <label>Username</label>
                <input type="text" id="suUsername" placeholder="e.g. aadhi_reads" autocomplete="username">
            </div>
            <div class="field">
                <label>Email address</label>
                <input type="email" id="suEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="suPassword" placeholder="At least 6 chars" autocomplete="new-password">
                    <div class="strength-wrap">
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        <div class="strength-label" id="strengthLabel"></div>
                    </div>
                </div>
                <div class="field">
                    <label>Date of birth</label>
                    <input type="date" id="suDob">
                </div>
            </div>

            <button class="submit-btn" id="suBtn">Create account</button>
        </div>

        <!-- Success state -->
        <div class="success-state" id="signupSuccess" style="display:none;flex-direction:column;align-items:center;text-align:center;padding:20px 0;">
            <div style="width:64px;height:64px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;margin-bottom:16px;animation:popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div style="font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px;">Account created!</div>
            <div style="font-size:14px;color:var(--ink-3);">Taking you to your library…</div>
        </div>
    </div>

    <!-- ══ BRAND PANEL ════════════════════════════════ -->
